<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE GAPT PROJECT</title>
  <meta name="description" content="Something serious is being built here." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@200;300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black:    #080808;
      --off-white: #f0ede8;
      --warm-gray: #9a958e;
      --faint:    #1a1917;
      --olive:    #7a8c6e;
      --border:   rgba(240, 237, 232, 0.08);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--black);
      color: var(--off-white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ── GRAIN OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    /* ── CUSTOM CURSOR ── */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--off-white);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease, background 0.3s ease;
      mix-blend-mode: difference;
    }

    .cursor.hover {
      width: 36px;
      height: 36px;
      background: var(--olive);
    }

    /* ── LAYOUT ── */
    .page {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(24px, 4vw, 52px) clamp(24px, 5vw, 64px);
      position: relative;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }

    .logo {
      font-family: 'DM Sans', sans-serif;
      font-weight: 200;
      font-size: clamp(10px, 1.1vw, 13px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--off-white);
      text-decoration: none;
    }

    .btn-login {
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(10px, 1vw, 12px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--warm-gray);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 10px 22px;
      border-radius: 1px;
      transition: color 0.4s ease, border-color 0.4s ease, background 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--olive);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
      z-index: -1;
    }

    .btn-login:hover {
      color: var(--off-white);
      border-color: var(--olive);
    }

    .btn-login:hover::after {
      transform: scaleX(1);
    }

    /* ── HERO ── */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    .hero-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(9px, 0.85vw, 11px);
      font-weight: 200;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--olive);
      margin-bottom: clamp(24px, 3vw, 40px);
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(72px, 13vw, 200px);
      line-height: 0.88;
      letter-spacing: -0.02em;
      color: var(--off-white);
      overflow: hidden;
    }

    .hero-title span {
      display: block;
      opacity: 0;
      transform: translateY(100%);
    }

    .hero-title span:nth-child(1) { animation: slideUp 1.1s cubic-bezier(0.16,1,0.3,1) 0.6s forwards; }
    .hero-title span:nth-child(2) { animation: slideUp 1.1s cubic-bezier(0.16,1,0.3,1) 0.75s forwards; }
    .hero-title span:nth-child(3) { animation: slideUp 1.1s cubic-bezier(0.16,1,0.3,1) 0.9s forwards; }

    .hero-title .line-italic {
      font-style: italic;
      color: var(--warm-gray);
    }

    .hero-sub {
      margin-top: clamp(28px, 3.5vw, 52px);
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(9px, 0.85vw, 11px);
      font-weight: 200;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--warm-gray);
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 1.2s forwards;
    }

    /* ── DIVIDER LINE ── */
    .divider {
      position: absolute;
      right: 0;
      top: 50%;
      width: 1px;
      height: 120px;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
      opacity: 0;
      animation: fadeIn 1.5s ease 1.5s forwards;
    }

    /* ── FOOTER ── */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 1.1s forwards;
    }

    .footer-left {
      font-size: clamp(9px, 0.8vw, 10px);
      font-weight: 200;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--warm-gray);
      line-height: 1.8;
    }

    .footer-right {
      text-align: right;
    }

    .footer-email {
      font-size: clamp(9px, 0.8vw, 10px);
      font-weight: 200;
      letter-spacing: 0.2em;
      color: var(--warm-gray);
      text-decoration: none;
      text-transform: lowercase;
      transition: color 0.3s ease;
      display: block;
    }

    .footer-email:hover {
      color: var(--off-white);
    }

    .footer-copy {
      font-size: clamp(9px, 0.75vw, 10px);
      font-weight: 200;
      letter-spacing: 0.2em;
      color: rgba(154,149,142,0.4);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── THIN HORIZONTAL LINE ── */
    .h-line {
      position: fixed;
      left: clamp(24px, 5vw, 64px);
      right: clamp(24px, 5vw, 64px);
      height: 1px;
      background: var(--border);
      opacity: 0;
      animation: fadeIn 1.5s ease 1.4s forwards;
    }

    .h-line-top    { top: clamp(24px, 4vw, 52px); }
    .h-line-bottom { bottom: clamp(24px, 4vw, 52px); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(100%); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      html, body { overflow: auto; }

      .page {
        height: auto;
        min-height: 100svh;
        padding: 28px 24px;
      }

      .hero { padding: 60px 0 80px; }

      .divider { display: none; }

      footer {
        flex-direction: column;
        gap: 16px;
        align-items: flex-start;
      }

      .footer-right { text-align: left; }
    }

    @media (max-width: 480px) {
      .hero-title {
        font-size: clamp(60px, 18vw, 80px);
      }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>

  <!-- Thin horizontal accent lines -->
  <div class="h-line h-line-top"></div>
  <div class="h-line h-line-bottom"></div>

  <div class="page">

    <!-- HEADER -->
    <header>
      <a href="/" class="logo" id="hover-target">The Gapt Project</a>
      <a href="https://studyflow.thegaptproject.com" class="btn-login" id="hover-target-2">Private Login</a>
    </header>

    <!-- HERO -->
    <main class="hero">
      <p class="hero-eyebrow">Est. 2026 — Work in progress</p>

      <h1 class="hero-title" aria-label="Website Under Construction">
        <span>Website</span>
        <span class="line-italic">Under</span>
        <span>Construction</span>
      </h1>

      <p class="hero-sub">The Gapt Project</p>

      <div class="divider"></div>
    </main>

    <!-- FOOTER -->
    <footer>
      <div class="footer-left">
        The Gapt Project<br>
        <span style="color:rgba(154,149,142,0.5)">Something serious is being built here.</span>
      </div>
      <div class="footer-right">
        <a href="mailto:hello@thegaptproject.com" class="footer-email" id="hover-target-3">hello@thegaptproject.com</a>
        <p class="footer-copy">© 2026</p>
      </div>
    </footer>

  </div>

  <script>
    // ── CUSTOM CURSOR ──
    const cursor = document.getElementById('cursor');
    let mx = -100, my = -100;
    let cx = -100, cy = -100;

    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
    });

    // Hover targets
    document.querySelectorAll('[id^="hover-target"]').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // Smooth cursor follow
    function animateCursor() {
      cx += (mx - cx) * 0.12;
      cy += (my - cy) * 0.12;
      cursor.style.left = cx + 'px';
      cursor.style.top  = cy + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Hide on mobile
    if ('ontouchstart' in window) {
      cursor.style.display = 'none';
    }
  </script>
</body>
</html>
